<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAFA - Gestión</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --azul: #000080; --rosa: #e91e63; }
        body { background-color: #f5f5f5; }
        nav { background-color: var(--azul); }
        .card-menu { height: 140px; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; font-weight: bold; border-radius: 15px; cursor: pointer; margin-bottom: 20px; }
        .btn-nuevo { background-color: #4caf50; }
        .btn-asociado { background-color: #00bcd4; }
        .container-form { display: none; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <nav><div class="nav-wrapper container"><a href="#" class="brand-logo">APAFA SDG-YUNGAY</a></div></nav>

    <div class="container">
        <div id="menu-principal" class="row" style="margin-top: 40px;">
            <div class="col s6 m3" onclick="ver('form-nuevo')"><div class="card-menu btn-nuevo"><i class="material-icons large">person_add</i>NUEVO</div></div>
            <div class="col s6 m3" onclick="ver('form-consulta')"><div class="card-menu btn-asociado"><i class="material-icons large">search</i>ASOCIADO</div></div>
        </div>

        <div id="form-nuevo" class="container-form card-panel">
            <h5>Nuevo Asociado</h5>
            <input id="nom" type="text" placeholder="Nombre completo">
            <input id="cel" type="number" placeholder="Celular">
            <input id="est" type="text" placeholder="Nombre estudiante">
            <input id="gra" type="text" placeholder="Grado">
            <input id="niv" type="text" placeholder="Nivel">
            <input id="sec" type="text" placeholder="Sección">
            <button class="btn green" onclick="guardar()">Guardar</button>
            <button class="btn grey" onclick="volver()">Volver</button>
        </div>

        <div id="form-consulta" class="container-form card-panel">
            <h5>Consulta</h5>
            <input id="busq" type="text" placeholder="Escribe un apellido...">
            <button class="btn blue" onclick="buscar()">Buscar</button>
            <button class="btn grey" onclick="volver()">Volver</button>
            <div id="resultados-busqueda" style="margin-top:20px;"></div>
        </div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznRzjbgq-mGKZq_PIYHtwb51Hynq2PAAcjnAHeg1UqAbK9oRnEjraKIyRhiZ9QID4e/exec"; // REEMPLAZA CADA VEZ

    function ver(id) {
        document.getElementById('menu-principal').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function volver() {
        document.querySelectorAll('.container-form').forEach(f => f.style.display = 'none');
        document.getElementById('menu-principal').style.display = 'flex';
        document.getElementById('resultados-busqueda').innerHTML = "";
    }

    // BUSCAR: Quitamos 'mode: no-cors' para poder leer la respuesta[cite: 7, 8]
    async function buscar() {
        const query = document.getElementById('busq').value.toLowerCase();
        const panel = document.getElementById('resultados-busqueda');
        if (query.length < 3) return alert("Escribe al menos 3 letras");
        panel.innerHTML = "Buscando...";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "consultar", query: query })
            });
            const res = await response.json();
            
            if (!res.data || res.data.length === 0) {
                panel.innerHTML = "No se encontraron resultados.";
                return;
            }

            let html = "<ul class='collection'>";
            res.data.forEach(asoc => {
                const d = encodeURIComponent(JSON.stringify(asoc));
                html += `<li class='collection-item'><a href='#!' onclick="verFicha('${d}')">👤 ${asoc[1]}</a></li>`;
            });
            panel.innerHTML = html + "</ul>";
        } catch (e) {
            panel.innerHTML = "Error de conexión o permisos. Revisa la implementación del script.";
        }
    }

    // GUARDAR: Aquí sí podemos usar 'no-cors'[cite: 7, 8]
    async function guardar() {
        const d = { 
            action: "nuevo", 
            nombre: document.getElementById('nom').value, 
            celular: document.getElementById('cel').value,
            estudiante: document.getElementById('est').value,
            grado: document.getElementById('gra').value,
            nivel: document.getElementById('niv').value,
            seccion: document.getElementById('sec').value
        };
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Enviado a Google Sheets");
        location.reload();
    }

    function verFicha(d) {
        const f = JSON.parse(decodeURIComponent(d));
        document.getElementById('resultados-busqueda').innerHTML = `
            <div class='card blue-grey darken-1'><div class='card-content white-text'>
            <span class='card-title'>${f[1]}</span>
            <p>Cel: ${f[2]} | Est: ${f[3]} | Grado: ${f[4]} ${f[6]}</p>
            </div><div class='card-action'><a href='#!' onclick='volver()'>Cerrar</a></div></div>`;
    }
</script></body>
</html>
