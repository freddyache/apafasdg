<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAFA - Santo Domingo de Guzman</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --azul-marino: #000080; --vibrante: #e91e63; }
        body { background-color: #f5f5f5; }
        nav { background-color: var(--azul-marino); }
        .card-menu {
            height: 140px; display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: white; font-weight: bold; border-radius: 15px;
            cursor: pointer; transition: 0.3s; margin-bottom: 20px;
        }
        .card-menu:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-nuevo { background-color: #4caf50; }
        .btn-asociado { background-color: #00bcd4; }
        .btn-deuda { background-color: #ff9800; }
        .btn-asistencia { background-color: var(--vibrante); }
        .container-form { display: none; padding: 20px; margin-top: 20px; }
        .brand-logo { font-weight: bold; font-size: 1.5rem !important; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-wrapper container">
            <a href="#" class="brand-logo">APAFA SDG-YUNGAY</a>
        </div>
    </nav>

    <div class="container">
        <!-- MENÚ PRINCIPAL -->
        <div id="menu-principal" class="row" style="margin-top: 40px;">
            <div class="col s6 m3" onclick="ver('form-nuevo')">
                <div class="card-menu btn-nuevo"><i class="material-icons large">person_add</i>NUEVO</div>
            </div>
            <div class="col s6 m3" onclick="ver('form-consulta')">
                <div class="card-menu btn-asociado"><i class="material-icons large">search</i>ASOCIADO</div>
            </div>
            <div class="col s6 m3" onclick="ver('form-consulta')">
                <div class="card-menu btn-deuda"><i class="material-icons large">account_balance_wallet</i>DEUDAS</div>
            </div>
            <div class="col s6 m3" onclick="ver('form-consulta')">
                <div class="card-menu btn-asistencia"><i class="material-icons large">event_available</i>ASISTENCIA</div>
            </div>
        </div>

        <!-- FORMULARIO NUEVO -->
        <div id="form-nuevo" class="container-form card-panel">
            <h5>Registrar Nuevo Asociado</h5>
            <div class="row">
                <div class="input-field col s12"><input id="nom" type="text"><label>Nombre del Asociado</label></div>
                <div class="input-field col s6"><input id="cel" type="number"><label>Celular</label></div>
                <div class="input-field col s6"><input id="est" type="text"><label>Nombre Estudiante</label></div>
                <div class="input-field col s4"><input id="gra" type="text"><label>Grado</label></div>
                <div class="input-field col s4"><input id="niv" type="text"><label>Nivel</label></div>
                <div class="input-field col s4"><input id="sec" type="text"><label>Sección</label></div>
            </div>
            <button class="btn green darken-2" onclick="guardar()">Guardar en Sheets</button>
            <button class="btn grey" onclick="volver()">Regresar</button>
        </div>

        <!-- MÓDULO CONSULTA -->
        <div id="form-consulta" class="container-form card-panel">
            <h5>Módulo de Consulta</h5>
            <p>Búsqueda por Nombre o Apellido:</p>
            <input id="busq" type="text" placeholder="Ej: Perez...">
            <button class="btn blue" onclick="buscar()">Buscar</button>
            <button class="btn grey" onclick="volver()">Regresar</button>
            
            <!-- CONTENEDOR DE RESULTADOS (Esto faltaba) -->
            <div id="resultados-busqueda" style="margin-top:20px;"></div>
        </div>
    </div>

<script>
    // 1. REEMPLAZA ESTA URL CON TU URL DE /EXEC ACTUAL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqhnxjvDy0vowkXs-IbEyAhY8TIC3JQU_ghYOCsJ3JNpeqarOT__Xhdz98UBieIgt0/exec";

    function ver(id) {
        document.getElementById('menu-principal').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function volver() {
        document.querySelectorAll('.container-form').forEach(f => f.style.display = 'none');
        document.getElementById('menu-principal').style.display = 'flex';
        document.getElementById('resultados-busqueda').innerHTML = "";
    }

    async function buscar() {
        const query = document.getElementById('busq').value.toLowerCase();
        const panel = document.getElementById('resultados-busqueda');
        
        if (query.length < 3) { alert("Escribe al menos 3 letras"); return; }
        panel.innerHTML = "<p>Buscando en Google Sheets...</p>";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "consultar", query: query })
            });
            const res = await response.json();
            
            if (res.data.length === 0) {
                panel.innerHTML = "<p class='red-text'>No se encontraron resultados.</p>";
                return;
            }

            let html = "<ul class='collection with-header'><li class='collection-header'><h6>Resultados:</h6></li>";
            res.data.forEach((asoc) => {
                const datosJson = encodeURIComponent(JSON.stringify(asoc));
                html += `<li class='collection-item'>
                            <a href='#!' onclick="verFicha('${datosJson}')" style='color:#000080; font-weight:bold;'>
                                👤 ${asoc[1]} <i class='material-icons right'>visibility</i>
                            </a>
                         </li>`;
            });
            html += "</ul>";
            panel.innerHTML = html;
        } catch (e) { 
            panel.innerHTML = "<p class='red-text'>Error de conexión. Revisa la URL del script.</p>"; 
        }
    }

    function verFicha(datos) {
        const fila = JSON.parse(decodeURIComponent(datos));
        document.getElementById('resultados-busqueda').innerHTML = `
            <div class='card blue-grey darken-1'>
                <div class='card-content white-text' style='text-align:left;'>
                    <span class='card-title'>Datos del Asociado</span>
                    <p><b>Asociado:</b> ${fila[1]}</p>
                    <p><b>Celular:</b> ${fila[2]}</p>
                    <hr>
                    <p><b>Estudiante:</b> ${fila[3]}</p>
                    <p><b>Grado/Sección:</b> ${fila[4]} - ${fila[6]}</p>
                    <p><b>Nivel:</b> ${fila[5]}</p>
                </div>
                <div class='card-action'><a href='#!' onclick='volver()'>Cerrar</a></div>
            </div>`;
    }

    async function guardar() {
        const d = {
            action: "nuevo",
            nombre: document.getElementById('nom').value,
            celular: document.getElementById('cel').value,
            estudiante: document.getElementById('est').value,
            grado: document.getElementById('gra').value,
            nivel: document.getElementById('niv').value,
            seccion: document.getElementById('sec').value
        };
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Guardado en Google Sheets con éxito");
        location.reload();
    }
</script>
</body>
</html>
